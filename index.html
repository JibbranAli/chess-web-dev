<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump & Avoid Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e222b;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            position: relative;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 2.2rem;
            color: #4cd137;
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #score {
            color: #eccc68;
        }

        #canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        canvas {
            background-color: #2f3542;
            border: 4px solid #747d8c;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: block;
        }

        /* Overlay UI button styling */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            transition: background-color 0.3s;
        }

        .start-btn {
            background-color: #4cd137;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 209, 55, 0.4);
            transition: transform 0.1s, background-color 0.2s;
        }

        .start-btn:hover {
            background-color: #44bd32;
            transform: scale(1.05);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .hint {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #a4b0be;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>JUMP!</h1>
        <div class="score-board">Score: <span id="score">0</span></div>
        
        <div id="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="250"></canvas>
            
            <div id="ui-layer">
                <button id="actionBtn" class="start-btn" onclick="startGame()">START GAME</button>
            </div>
        </div>
        
        <div class="hint">Press Spacebar or Click Screen to Jump</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const uiLayer = document.getElementById("ui-layer");
        const actionBtn = document.getElementById("actionBtn");

        // Game Configuration & States
        let gameRunning = false;
        let score = 0;
        let animationFrameId;

        // Physics constants
        const gravity = 0.6;
        const groundY = canvas.height - 40; // Floor platform location

        // Player Object
        const player = {
            x: 50,
            y: groundY - 40,
            width: 30,
            height: 40,
            velocityY: 0,
            isJumping: false,
            jumpForce: -12,
            
            draw() {
                ctx.fillStyle = "#4cd137"; // Neon Green player
                ctx.fillRect(this.x, this.y, this.width, this.height);
            },
            
            update() {
                // Apply Gravity physics
                this.velocityY += gravity;
                this.y += this.velocityY;

                // Stop falling when touching the ground floor level
                if (this.y >= groundY - this.height) {
                    this.y = groundY - this.height;
                    this.velocityY = 0;
                    this.isJumping = false;
                }
            },
            
            jump() {
                if (!this.isJumping) {
                    this.velocityY = this.jumpForce;
                    this.isJumping = true;
                }
            }
        };

        // Obstacle tracking array
        let obstacles = [];
        let obstacleTimer = 0;
        let obstacleSpeed = 5;

        class Obstacle {
            constructor() {
                this.width = 20 + Math.random() * 15;   // Random width
                this.height = 30 + Math.random() * 30;  // Random heights
                this.x = canvas.width;
                this.y = groundY - this.height;
            }

            draw() {
                ctx.fillStyle = "#ff4757"; // Coral red obstacles
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.x -= obstacleSpeed;
            }
        }

        function startGame() {
            // Hide menu overlay UI
            uiLayer.style.display = "none";
            
            // Reset configurations
            score = 0;
            obstacleSpeed = 5;
            obstacles = [];
            obstacleTimer = 0;
            player.y = groundY - player.height;
            player.velocityY = 0;
            player.isJumping = false;
            scoreElement.textContent = score;
            
            gameRunning = true;
            
            // Run the game loop
            cancelAnimationFrame(animationFrameId);
            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;

            // 1. Clear Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Floor Platform
            ctx.fillStyle = "#747d8c";
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            // 3. Update & Draw Player
            player.update();
            player.draw();

            // 4. Handle Spawning Obstacles dynamically over frames
            obstacleTimer++;
            if (obstacleTimer > (80 + Math.random() * 40)) { // Random delay between spawns
                obstacles.push(new Obstacle());
                obstacleTimer = 0;
            }

            // 5. Update and Draw active obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                obstacles[i].draw();

                // Check for rectangle overlap hitboxes (Collisions)
                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y
                ) {
                    gameOver();
                    return;
                }

                // Remove obstacle if it travels past the left edge, award points
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score += 1;
                    scoreElement.textContent = score;

                    // Gradually speed up game as points stack up
                    if (score % 5 === 0 && obstacleSpeed < 12) {
                        obstacleSpeed += 0.5;
                    }
                }
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            
            // Re-show menu layer configuration as Game Over
            uiLayer.style.display = "flex";
            uiLayer.style.backgroundColor = "rgba(255, 71, 87, 0.4)"; // Tint overlay reddish
            actionBtn.textContent = "RESTART GAME";
            actionBtn.style.backgroundColor = "#ff4757";
            actionBtn.style.boxShadow = "0 4px 15px rgba(255, 71, 87, 0.4)";
        }

        // --- Controls System Hookups ---

        // Listen for Keyboard commands
        window.addEventListener("keydown", (e) => {
            if (e.key === " " || e.key === "ArrowUp") {
                e.preventDefault(); // Stop window space bar page-scrolling defaults
                if (gameRunning) {
                    player.jump();
                } else if (uiLayer.style.display !== "none") {
                    startGame(); // Start if menu active
                }
            }
        });

        // Listen for Click / Touch screen gestures on Canvas zone
        canvas.addEventListener("mousedown", () => {
            if (gameRunning) player.jump();
        });
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            if (gameRunning) player.jump();
        });

        // Render initial aesthetic canvas landscape scene before start triggers
        ctx.fillStyle = "#747d8c";
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        player.draw();
    </script>
</body>
</html>
